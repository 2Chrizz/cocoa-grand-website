<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout | COCOA GRAND</title>

    <link rel="stylesheet" href="css/style.css" />

    <link rel="icon" type="image/png" href="img/logogg.png">

    <meta name="description" content="Sicherer Checkout für COCOA GRAND Smoke Pellets. Bezahlung mit PayPal." />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --radius: 16px;
            --gap: 12px;
        }

        .checkout-container {
            max-width: 900px;
            margin: 120px auto;
            padding: 20px;
        }

        .checkout-box {
            background: var(--card);
            padding: 30px;
            border-radius: var(--radius);
        }

        .checkout-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--gap);
            flex-wrap: wrap;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .checkout-summary {
            margin-top: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .summary-total {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 15px;
        }

        #paypal-button-container {
            margin-top: 30px;
        }

        .discount-box {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .discount-box input {
            flex: 1;
            min-width: 180px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .discount-box button {
            padding: 10px 15px;
            cursor: pointer;
            white-space: nowrap;
        }

        #discount-message {
            width: 100%;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .shop-info {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkout-legal {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 15px;
        }

        @media (max-width: 600px) {

            .checkout-container {
                margin: 40px auto;
                padding: 12px;
            }

            .checkout-box {
                padding: 18px;
            }

            .summary-total {
                font-size: 1.2rem;
            }

            .checkout-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .checkout-product-price {
                margin-top: 8px;
            }
        }
    </style>

<body>

    <main class="checkout-container">

        <h1>Checkout</h1>

        <section class="checkout-box">

            <div id="checkout-items"></div>

            <!-- DISCOUNT -->
            <div class="discount-box">

                <input type="text" id="discount-code" placeholder="Rabattcode eingeben" />

                <button id="apply-discount">
                    Einlösen
                </button>

                <div id="discount-message"></div>

            </div>

            <!-- SUMMARY -->
            <div class="checkout-summary">

                <div class="summary-row">
                    <span>Zwischensumme</span>
                    <span id="subtotal">0,00 €</span>
                </div>

                <div class="summary-row">
                    <span>Versand</span>
                    <span id="shipping">0,00 €</span>
                </div>

                <div class="summary-row">
                    <span>Rabatt</span>
                    <span id="discount">0,00 €</span>
                </div>

                <div class="summary-row summary-total">
                    <span>Gesamt</span>
                    <span id="total">0,00 €</span>
                </div>

                <p class="checkout-legal">
                    Mit Abschluss der Bestellung akzeptieren Sie unsere
                    <a href="agb.html">AGB</a>,
                    <a href="widerruf.html">Widerrufsbelehrung</a>
                    und
                    <a href="datenschutz.html">Datenschutzerklärung</a>.
                </p>

            </div>

            <!-- PAYPAL -->
            <div id="paypal-button-container"></div>

            <!-- INFO -->
            <div class="shop-info">

                <div class="shop-info-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    Sichere Zahlung mit PayPal
                </div>

                <div class="shop-info-item">
                    <i class="fa-solid fa-box"></i>
                    Versandfrei ab 39,99 €
                </div>

                <div class="shop-info-item">
                    <i class="fa-solid fa-truck"></i>
                    Versand in 2–4 Werktagen
                </div>

            </div>

        </section>

    </main>

</body>

<script
    src="https://www.paypal.com/sdk/js?client-id=Ac4DxvlVow2_0I7rIbtTTBKDcIgQpVpROfQQYiIyaHHnWQGEB_Us8VclfRc-ESbF5HMvGcaxWZH92hxy&currency=EUR"></script>

<script>
    /* ========================================
        WARENKORB LADEN
    ======================================== */

    let cart = [];

    try {
        cart = JSON.parse(localStorage.getItem("cart")) || [];
    } catch (error) {
        console.error("Fehler beim Laden des Warenkorbs:", error);
        cart = [];
    }

    if (!cart.length) {
        alert("Ihr Warenkorb ist leer.");
        window.location.replace("index.html");
    }

    /* ========================================
       DOM
    ======================================== */

    const checkoutItems = document.getElementById("checkout-items");
    const subtotalElement = document.getElementById("subtotal");
    const shippingElement = document.getElementById("shipping");
    const discountElement = document.getElementById("discount");
    const totalElement = document.getElementById("total");

    const discountInput = document.getElementById("discount-code");
    const discountButton = document.getElementById("apply-discount");
    const discountMessage = document.getElementById("discount-message");

    /* ========================================
       HILFSFUNKTIONEN
    ======================================== */

    const formatPrice = (price) =>
        `${price.toFixed(2).replace(".", ",")} €`;

    const discountCodes = {
        SOMMER26: {
            percent: 26,
            expires: "2026-06-29"
        }
    };

    let discountPercent = 0;
    let discountAmount = 0;

    /* ========================================
       PRODUKTE RENDERN
    ======================================== */

    const subtotal = cart.reduce((sum, item) => {
        return sum + Number(item.price) * Number(item.qty);
    }, 0);

    checkoutItems.innerHTML = cart
        .map((item) => {
            const itemTotal = Number(item.price) * Number(item.qty);

            return `
            <div class="checkout-item">
                <div>
                    <div class="checkout-product-name">
                        ${item.name}
                    </div>

                    ${item.size
                    ? `
                        <div class="checkout-product-size">
                            ${item.size}
                        </div>
                    `
                    : ""
                }

                    <div class="checkout-product-qty">
                        Menge: ${item.qty}
                    </div>
                </div>

                <div class="checkout-product-price">
                    ${formatPrice(itemTotal)}
                </div>
            </div>
        `;
        })
        .join("");

    /* ========================================
       PREISE BERECHNEN
    ======================================== */

    function getPriceData() {

        const subtotalCents = Math.round(subtotal * 100);

        const discountCents = Math.round(discountAmount * 100);

        const discountedSubtotal =
            Math.max(0, subtotalCents - discountCents);

        const shippingCents =
            discountedSubtotal < 3999 ? 395 : 0;

        const totalCents =
            discountedSubtotal + shippingCents;

        return {
            itemTotal: subtotalCents / 100,
            discount: discountCents / 100,
            shipping: shippingCents / 100,
            total: totalCents / 100
        };
    }

    function updateTotals() {

        const prices = getPriceData();

        subtotalElement.textContent =
            formatPrice(prices.itemTotal);

        shippingElement.textContent =
            formatPrice(prices.shipping);

        discountElement.textContent =
            "-" + formatPrice(prices.discount);

        totalElement.textContent =
            formatPrice(prices.total);
    }

    updateTotals();

    /* ========================================
       RABATTCODE
    ======================================== */

    function applyDiscountCode() {

        if (discountPercent > 0) {
            discountMessage.textContent =
                "Es wurde bereits ein Rabattcode angewendet.";
            return;
        }

        const code =
            discountInput.value.trim().toUpperCase();

        const entry =
            discountCodes[code];

        if (!entry) {
            discountMessage.textContent =
                "Ungültiger Rabattcode.";
            return;
        }

        const expiry =
            new Date(entry.expires + "T23:59:59");

        if (new Date() > expiry) {
            discountMessage.textContent =
                "Dieser Rabattcode ist abgelaufen.";
            return;
        }

        discountPercent =
            entry.percent;

        discountAmount =
            Math.round(
                subtotal *
                (discountPercent / 100) *
                100
            ) / 100;

        updateTotals();

        discountInput.disabled = true;
        discountButton.disabled = true;

        discountMessage.textContent =
            `${discountPercent}% Rabatt erfolgreich angewendet.`;
    }

    discountButton.addEventListener(
        "click",
        applyDiscountCode
    );

    discountInput.addEventListener(
        "keydown",
        (e) => {
            if (e.key === "Enter") {
                applyDiscountCode();
            }
        }
    );

    /* ========================================
       PAYPAL
    ======================================== */

    window.addEventListener("load", () => {

        const paypalContainer =
            document.getElementById(
                "paypal-button-container"
            );

        if (!window.paypal) {

            console.error(
                "PayPal SDK konnte nicht geladen werden."
            );

            paypalContainer.innerHTML = `
            <p>
                PayPal konnte nicht geladen werden.
                Bitte Seite neu laden.
            </p>
        `;

            return;
        }

        paypal
            .Buttons({

                createOrder(data, actions) {

                    const prices =
                        getPriceData();

                    return actions.order.create({

                        purchase_units: [
                            {
                                amount: {
                                    currency_code: "EUR",

                                    value:
                                        prices.total.toFixed(
                                            2
                                        ),

                                    breakdown: {
                                        item_total: {
                                            currency_code:
                                                "EUR",

                                            value: (
                                                prices.itemTotal -
                                                prices.discount
                                            ).toFixed(2)
                                        },

                                        shipping: {
                                            currency_code:
                                                "EUR",

                                            value:
                                                prices.shipping.toFixed(
                                                    2
                                                )
                                        }
                                    }
                                },

                                items: cart.map(
                                    (item) => ({
                                        name:
                                            item.name +
                                            (item.size
                                                ? ` ${item.size}`
                                                : ""),

                                        quantity:
                                            String(
                                                Math.max(
                                                    1,
                                                    parseInt(
                                                        item.qty
                                                    )
                                                )
                                            ),

                                        unit_amount: {
                                            currency_code:
                                                "EUR",

                                            value:
                                                Number(
                                                    item.price
                                                ).toFixed(
                                                    2
                                                )
                                        }
                                    })
                                )
                            }
                        ]
                    });
                },

                async onApprove(
                    data,
                    actions
                ) {

                    try {

                        const details =
                            await actions.order.capture();

                        console.log(
                            "Zahlung erfolgreich:",
                            details
                        );

                        localStorage.removeItem(
                            "cart"
                        );

                        window.location.href =
                            "success.html";

                    } catch (error) {

                        console.error(
                            "Capture Fehler:",
                            error
                        );

                        alert(
                            "Die Zahlung konnte nicht abgeschlossen werden."
                        );
                    }
                },

                onError(error) {

                    console.error(
                        "PayPal Fehler:",
                        error
                    );

                    alert(
                        "PayPal konnte die Bestellung nicht erstellen. Bitte versuchen Sie es erneut."
                    );
                }
            })
            .render("#paypal-button-container")
            .catch((error) => {

                console.error(
                    "PayPal Render Fehler:",
                    error
                );

                paypalContainer.innerHTML = `
                <p>
                    PayPal konnte nicht geladen werden.
                </p>
            `;
            });
    });
</script>
</body>

</html>
