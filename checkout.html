<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <a href="index.html" class="back-shopping">
        <i class="fa-solid fa-arrow-left"></i>
        Weiter einkaufen
    </a>

    <title>Checkout | COCOA GRAND</title>

    <link rel="stylesheet" href="css/style.css" />

    <link rel="icon" type="image/png" href="img/logogg.png">

    <meta name="description" content="Sicherer Checkout für COCOA GRAND Smoke Pellets. Bezahlung mit PayPal." />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --radius: 16px;
            --gap: 12px;
        }

        .checkout-container {
            max-width: 900px;
            margin: 120px auto;
            padding: 20px;
        }

        .checkout-box {
            background: var(--card);
            padding: 30px;
            border-radius: var(--radius);
        }

        .checkout-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--gap);
            flex-wrap: wrap;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .checkout-summary {
            margin-top: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .summary-total {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 15px;
        }

        #paypal-button-container {
            margin-top: 30px;
        }

        .back-shopping {
            display: inline-flex;
            align-items: center;
            gap: 10px;

            margin-bottom: 25px;

            padding: 12px 18px;

            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 12px;

            background: rgba(255, 255, 255, .03);

            color: #000000;
            text-decoration: none;

            transition: .25s;
        }

        .back-shopping:hover {
            background: rgba(255, 255, 255, .08);
            border-color: var(--accent);
            color: var(--accent);

            transform: translateX(-3px);
        }

        .back-shopping i {
            transition: .25s;
        }

        .back-shopping:hover i {
            transform: translateX(-4px);
        }

        .discount-box {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .discount-box input {
            flex: 1;
            min-width: 180px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .discount-box button {
            padding: 10px 15px;
            cursor: pointer;
            white-space: nowrap;
        }

        #discount-message {
            width: 100%;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .shop-info {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkout-legal {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 15px;
        }

        @media (max-width: 600px) {

            .checkout-container {
                margin: 40px auto;
                padding: 12px;
            }

            .checkout-box {
                padding: 18px;
            }

            .summary-total {
                font-size: 1.2rem;
            }

            .checkout-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .checkout-product-price {
                margin-top: 8px;
            }
        }
    </style>

<body>

    <main class="checkout-container">

        <h1>Checkout</h1>

        <section class="checkout-box">

            <div id="checkout-items"></div>

            <!-- DISCOUNT -->
            <div class="discount-box">

                <input type="text" id="discount-code" placeholder="Rabattcode eingeben" />

                <button id="apply-discount">
                    Einlösen
                </button>

                <div id="discount-message"></div>

            </div>

            <!-- SUMMARY -->
            <div class="checkout-summary">

                <div class="summary-row">
                    <span>Zwischensumme</span>
                    <span id="subtotal">0,00 €</span>
                </div>

                <div class="summary-row">
                    <span>Versand</span>
                    <span id="shipping">0,00 €</span>
                </div>

                <div class="summary-row">
                    <span>Rabatt</span>
                    <span id="discount">0,00 €</span>
                </div>

                <div class="summary-row summary-total">
                    <span>Gesamt</span>
                    <span id="total">0,00 €</span>
                </div>

                <p class="checkout-legal">
                    Mit Abschluss der Bestellung akzeptieren Sie unsere
                    <a href="agb.html">AGB</a>,
                    <a href="widerruf.html">Widerrufsbelehrung</a>
                    und
                    <a href="datenschutz.html">Datenschutzerklärung</a>.
                </p>

            </div>

            <!-- PAYPAL -->
            <div id="paypal-button-container"></div>

            <!-- INFO -->
            <div class="shop-info">

                <div class="shop-info-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    Sichere Zahlung mit PayPal
                </div>

                <div class="shop-info-item">
                    <i class="fa-solid fa-box"></i>
                    Versandfrei ab 40,00 €
                </div>

                <div class="shop-info-item">
                    <i class="fa-solid fa-truck"></i>
                    Versand in 2–4 Werktagen
                </div>

            </div>

        </section>

    </main>

</body>

<script
    src="https://www.paypal.com/sdk/js?client-id=Ac4DxvlVow2_0I7rIbtTTBKDcIgQpVpROfQQYiIyaHHnWQGEB_Us8VclfRc-ESbF5HMvGcaxWZH92hxy&currency=EUR"></script>
<script>
    /* ==========================================================
    COCOA GRAND CHECKOUT
========================================================== */

    /* ==========================================================
        WARENKORB LADEN
    ========================================================== */

    let cart = [];

    try {

        cart = JSON.parse(localStorage.getItem("cart")) || [];

    } catch {

        cart = [];

    }

    if (cart.length === 0) {

        alert("Ihr Warenkorb ist leer.");
        window.location.replace("index.html");

    }

    /* ==========================================================
        DOM
    ========================================================== */

    const checkoutItems = document.getElementById("checkout-items");

    const subtotalElement = document.getElementById("subtotal");
    const shippingElement = document.getElementById("shipping");
    const discountElement = document.getElementById("discount");
    const totalElement = document.getElementById("total");

    const discountInput =
        document.getElementById("discount-code");

    const discountButton =
        document.getElementById("apply-discount");

    const discountMessage =
        document.getElementById("discount-message");

    /* ==========================================================
        RABATTCODES
    ========================================================== */

    const discountCodes = {

        SOMMER26: {

            percent: 26,

            expires: "2026-06-29"

        }

    };

    let activeDiscount = null;

    /* ==========================================================
        HILFSFUNKTIONEN
    ========================================================== */

    function formatPrice(cents) {

        return (cents / 100)
            .toFixed(2)
            .replace(".", ",") + " €";

    }

    function toCents(value) {

        return Math.round(Number(value) * 100);

    }

    /* ==========================================================
        PREISBERECHNUNG
    ========================================================== */

    function calculateCart() {

        //--------------------------------------------------
        // Artikel
        //--------------------------------------------------

        let itemTotalCents = 0;

        cart.forEach(item => {

            itemTotalCents +=

                toCents(item.price) *

                Number(item.qty);

        });

        //--------------------------------------------------
        // Rabatt
        //--------------------------------------------------

        let discountCents = 0;

        if (activeDiscount) {

            discountCents = Math.round(

                itemTotalCents *

                activeDiscount.percent /

                100

            );

        }

        //--------------------------------------------------
        // Zwischensumme
        //--------------------------------------------------

        const subtotalAfterDiscount =

            Math.max(

                0,

                itemTotalCents - discountCents

            );

        //--------------------------------------------------
        // Versand
        //--------------------------------------------------

        const shippingCents =

            subtotalAfterDiscount >= 4000

                ? 0

                : 395;

        //--------------------------------------------------
        // Gesamt
        //--------------------------------------------------

        const totalCents =

            subtotalAfterDiscount +

            shippingCents;

        return {

            itemTotalCents,

            discountCents,

            shippingCents,

            totalCents

        };

    }

    /* ==========================================================
        WARENKORB RENDERN
    ========================================================== */

    function renderCart() {

        checkoutItems.innerHTML = "";

        cart.forEach(item => {

            const priceCents =

                toCents(item.price);

            const totalCents =

                priceCents *

                Number(item.qty);

            checkoutItems.innerHTML += `

<div class="checkout-item">

    <div>

        <div class="checkout-product-name">

            ${item.name}

        </div>

        ${item.size ?

                    `<div class="checkout-product-size">

                ${item.size}

            </div>`

                    : ""}

        <div class="checkout-product-qty">

            Menge: ${item.qty}

        </div>

    </div>

    <div class="checkout-product-price">

        ${formatPrice(totalCents)}

    </div>

</div>

`;

        });

    }

    /* ==========================================================
        PREISE AKTUALISIEREN
    ========================================================== */

    function updateTotals() {

        const prices =

            calculateCart();

        subtotalElement.textContent =

            formatPrice(

                prices.itemTotalCents

            );

        shippingElement.textContent =

            formatPrice(

                prices.shippingCents

            );

        discountElement.textContent =

            "-" +

            formatPrice(

                prices.discountCents

            );

        totalElement.textContent =

            formatPrice(

                prices.totalCents

            );

    }
    /* ==========================================================
        RABATTCODE
    ========================================================== */

    function applyDiscountCode() {

        if (activeDiscount) {

            discountMessage.textContent =
                "Es wurde bereits ein Rabattcode eingelöst.";

            return;
        }

        const code =
            discountInput.value
                .trim()
                .toUpperCase();

        const entry =
            discountCodes[code];

        if (!entry) {

            discountMessage.textContent =
                "Ungültiger Rabattcode.";

            return;
        }

        const expiry =
            new Date(entry.expires + "T23:59:59");

        if (Date.now() > expiry.getTime()) {

            discountMessage.textContent =
                "Dieser Rabattcode ist abgelaufen.";

            return;
        }

        activeDiscount = entry;

        discountInput.disabled = true;
        discountButton.disabled = true;

        discountMessage.textContent =
            `${entry.percent}% Rabatt erfolgreich aktiviert.`;

        updateTotals();

        renderPayPal();

    }

    /* ==========================================================
        PAYPAL ITEMS
    ========================================================== */

    function createPaypalItems() {

        return cart.map(item => ({

            name:
                item.name +
                (item.size ? ` ${item.size}` : ""),

            quantity:
                String(Number(item.qty)),

            unit_amount: {

                currency_code: "EUR",

                value:
                    (toCents(item.price) / 100).toFixed(2)

            }

        }));

    }

    /* ==========================================================
        PAYPAL
    ========================================================== */

    function renderPayPal() {

        const container =
            document.getElementById(
                "paypal-button-container"
            );

        container.innerHTML = "";

        const prices =
            calculateCart();

        paypal.Buttons({

            createOrder(data, actions) {

                return actions.order.create({

                    purchase_units: [{

                        amount: {

                            currency_code: "EUR",

                            value:
                                (prices.totalCents / 100)
                                    .toFixed(2),

                            breakdown: {

                                item_total: {

                                    currency_code: "EUR",

                                    value:
                                        (prices.itemTotalCents / 100)
                                            .toFixed(2)

                                },

                                shipping: {

                                    currency_code: "EUR",

                                    value:
                                        (prices.shippingCents / 100)
                                            .toFixed(2)

                                },

                                discount: {

                                    currency_code: "EUR",

                                    value:
                                        (prices.discountCents / 100)
                                            .toFixed(2)

                                }

                            }

                        },

                        items:
                            createPaypalItems()

                    }]

                });

            },

            async onApprove(data, actions) {

                try {

                    await actions.order.capture();

                    localStorage.removeItem("cart");

                    window.location.href =
                        "success.html";

                }

                catch (error) {

                    console.error(error);

                    alert(
                        "Die Zahlung konnte nicht abgeschlossen werden."
                    );

                }

            },

            onCancel() {

                console.log(
                    "PayPal Zahlung abgebrochen."
                );

            },

            onError(error) {

                console.error(
                    "PayPal Fehler:",
                    error
                );

                alert(
                    "Bei der PayPal-Zahlung ist ein Fehler aufgetreten."
                );

            }

        }).render("#paypal-button-container");

    }

    /* ==========================================================
        EVENTS
    ========================================================== */

    discountButton.addEventListener(

        "click",

        applyDiscountCode

    );

    discountInput.addEventListener(

        "keydown",

        event => {

            if (event.key === "Enter") {

                applyDiscountCode();

            }

        }

    );

    /* ==========================================================
        INITIALISIERUNG
    ========================================================== */

    renderCart();

    updateTotals();

    renderPayPal();
</script>
</body>

</html>
